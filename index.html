<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo AI Startup 🚀</title>

<style>
body{margin:0;font-family:-apple-system;background:#0a0a0a;color:white}
.app{display:flex;flex-direction:column;height:100vh}

/* header */
.header{padding:12px;background:#111;text-align:center;font-weight:bold}

/* builder tools */
.tools{display:flex;gap:8px;padding:8px;background:#111;overflow:auto}
.tool{background:#222;padding:8px;border-radius:10px}

/* chat */
.chat{flex:1;overflow:auto;padding:10px}
.msg{padding:10px;border-radius:12px;margin-bottom:8px;max-width:80%}
.user{background:#00aaff;align-self:flex-end}
.ai{background:#222}

/* preview */
.preview{height:40%}
iframe{width:100%;height:100%;border:none;background:white}

/* input */
.inputBar{display:flex;padding:8px;background:#111;gap:6px}
input{flex:1;padding:10px;border-radius:10px;border:none}
button{padding:10px;border-radius:10px;border:none;background:linear-gradient(45deg,#00ffcc,#00aaff)}

.card{background:#111;padding:10px;border-radius:12px;margin-bottom:10px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

</head>
<body>

<div class="app">

<div class="header">🚀 Halo AI Startup</div>

<div class="tools">
<button onclick="newApp()">🆕</button>
<button onclick="publish()">🌍</button>
<button onclick="openStore()">🏪</button>
</div>

<div class="chat" id="chat"></div>

<div class="preview">
<iframe id="view"></iframe>
</div>

<div class="inputBar">
<input id="input" placeholder="Describe or edit app...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey:"PASTE",
  authDomain:"PASTE",
  projectId:"halo-ai-store"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 👤 LOGIN (anonymous)
auth.signInAnonymously();

// state
let history=[];
let currentCode="";
let userId="";

// get user
auth.onAuthStateChanged(u=>{
if(u) userId = u.uid;
});

// refs
const chat=document.getElementById("chat");
const view=document.getElementById("view");

// UI
function msg(t,type){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

// render
function render(){
view.srcdoc=currentCode;
}

// fallback
function fallback(p){
return `<h2>${p}</h2><button onclick="alert('ok')">Run</button>`;
}

// AI builder
async function send(){
const text=input.value;
if(!text)return;

msg(text,"user");
input.value="";
history.push(text);

msg("Thinking...","ai");

let code="";

try{
const res=await fetch("https://api.openai.com/v1/responses",{
method:"POST",
headers:{
"Authorization":"Bearer "+localStorage.getItem("key"),
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4.1-mini",
input:`
You are a professional app builder.

Conversation:
${history.join("\n")}

Create or update a modern mobile app UI.
Return ONLY HTML.
`
})
});

const data=await res.json();

code=
data?.output?.[0]?.content?.[0]?.text||
data?.output_text||
fallback(text);

}catch{
code=fallback(text);
}

currentCode=code;
render();

msg("Updated ✅","ai");
}

// publish
async function publish(){

if(!currentCode)return alert("No app");

const title = prompt("App name?");
const id=Date.now().toString();

await db.collection("apps").doc(id).set({
title:title||"Untitled",
code:currentCode,
likes:0,
created:Date.now(),
user:userId
});

const url=location.origin+location.pathname+"?id="+id;
prompt("Share:",url);
}

// ❤️ like
async function like(id){
const ref = db.collection("apps").doc(id);
await ref.update({
likes: firebase.firestore.FieldValue.increment(1)
});
openStore();
}

// 🏪 store
async function openStore(){

chat.innerHTML="<h2>🔥 Trending Apps</h2>";

const snap=await db.collection("apps")
.orderBy("likes","desc")
.limit(20)
.get();

snap.forEach(doc=>{

const app=doc.data();

const c=document.createElement("div");
c.className="card";

c.innerHTML=`
<b>${app.title}</b><br>
❤️ ${app.likes}
<br>
<button onclick="openApp('${doc.id}')">Open</button>
<button onclick="like('${doc.id}')">Like</button>
`;

chat.appendChild(c);

});
}

// open
function openApp(id){
location.search="?id="+id;
}

// new
function newApp(){
history=[];
currentCode="<h2>New App</h2>";
render();
}

// load shared
const params=new URLSearchParams(location.search);
const id=params.get("id");

if(id){
db.collection("apps").doc(id).get().then(doc=>{
if(doc.exists){
currentCode=doc.data().code;
render();
}
});
}

// init
render();

// save key
const k=prompt("Paste OpenAI API key (optional)");
if(k)localStorage.setItem("key",k);

</script>

</body>
</html>
