<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo AI Store 🌍</title>

<style>
body{margin:0;font-family:-apple-system;background:#0a0a0a;color:white}
.header{padding:16px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:16px}
input{width:100%;padding:14px;border-radius:12px;border:none;margin-bottom:10px}
button{width:100%;padding:14px;border-radius:12px;border:none;margin-bottom:10px;background:linear-gradient(45deg,#00ffcc,#00aaff);font-weight:bold}
.grid{display:grid;gap:16px}
.card{background:#111;border-radius:16px;padding:12px}
iframe{width:100%;height:220px;border:none;border-radius:10px;background:white}
.small{padding:10px;font-size:12px;margin-top:5px}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>
<body>

<div class="header">🌍 Halo AI App Store</div>

<div class="container">

<input id="key" placeholder="OpenAI API key (optional)">
<input id="prompt" placeholder="Describe your app">

<button onclick="create()">🚀 Generate</button>
<button onclick="openStore()">🏪 Store</button>

<div class="grid" id="apps"></div>

</div>

<script>

// 🔥 PASTE YOUR REAL CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyA1HffNu5gW2tq4n881-64OiVXhxlGrThg",
  authDomain: "halo-ai-store.firebaseapp.com",
  projectId: "halo-ai-store"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const appsDiv = document.getElementById("apps");

// 🔗 OPEN SHARED APP
const params = new URLSearchParams(location.search);
const id = params.get("id");

if(id){
loadApp(id);
}

async function loadApp(id){
const doc = await db.collection("apps").doc(id).get();
if(doc.exists){
document.body.innerHTML = `
<iframe style="width:100%;height:100vh;border:none"
srcdoc="${doc.data().code}"></iframe>
`;
}
}

// fallback
function fallback(p){
if(p.includes("todo")){
return `<input placeholder="Task" onkeydown="if(event.key==='Enter'){this.nextElementSibling.innerHTML+='<li>'+this.value+'</li>';this.value=''}"><ul></ul>`;
}
return `<h2>${p}</h2><button onclick="alert('Works')">Run</button>`;
}

// CREATE
async function create(){

const p = (prompt.value || "demo app").toLowerCase();
const k = key.value;

const card = document.createElement("div");
card.className="card";
card.innerHTML="⏳ Generating...";
appsDiv.prepend(card);

let code = "";

if(!k){
code = fallback(p);
}else{
try{
const res = await fetch("https://api.openai.com/v1/responses",{
method:"POST",
headers:{
"Authorization":"Bearer "+k,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4.1-mini",
input:`Create a small mobile web app. Only code. ${p}`
})
});

const data = await res.json();

code =
data?.output?.[0]?.content?.[0]?.text ||
data?.output_text ||
fallback(p);

}catch{
code = fallback(p);
}
}

// render
card.innerHTML = `
<b>${p}</b>
<iframe srcdoc="${escapeHtml(code)}"></iframe>

<button onclick='publish(${JSON.stringify(code)}, "${p}")'>🌍 Publish</button>
`;
}

// 🌍 PUBLISH
async function publish(code,title){

const id = Date.now().toString();

await db.collection("apps").doc(id).set({
title,
code,
created: Date.now()
});

const url = location.origin + location.pathname + "?id=" + id;

alert("App published! Copy link:");
prompt("Link:", url);
}

// 🏪 STORE
async function openStore(){

appsDiv.innerHTML="<h2>🌍 App Store</h2>";

const snap = await db.collection("apps")
.orderBy("created","desc")
.get();

snap.forEach(doc=>{

const app = doc.data();

const c = document.createElement("div");
c.className="card";

c.innerHTML=`
<b>${app.title}</b>
<iframe srcdoc="${escapeHtml(app.code)}"></iframe>
<button onclick="openApp('${doc.id}')">Open</button>
`;

appsDiv.appendChild(c);

});
}

// open
function openApp(id){
location.search="?id="+id;
}

// safe html
function escapeHtml(str){
return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;");
}

</script>

</body>
</html>
