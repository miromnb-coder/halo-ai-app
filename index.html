<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Halo AI</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: radial-gradient(circle at top, #0a0f2c, #02030a);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      margin-bottom: 10px;
      animation: fadeIn 0.3s ease;
    }

    .user {
      background: #2f6df6;
      align-self: flex-end;
      margin-left: auto;
    }

    .ai {
      background: #1a1a1a;
      align-self: flex-start;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      width: 50px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00f0ff, #00ff9d);
      color: black;
      font-size: 18px;
      cursor: pointer;
    }

    .status {
      padding: 8px 15px;
      font-size: 13px;
      color: #aaa;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>🚀 Halo AI</header>

<div class="chat" id="chat"></div>

<div class="status" id="status">Valmis</div>

<div class="inputBox">
  <input id="input" placeholder="Kysy mitä vaan..." />
  <button onclick="send()">➤</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const status = document.getElementById("status");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    status.innerText = "AI ajattelee...";

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Virhe");
      }

      addMessage(data.reply, "ai");
      status.innerText = "Valmis";

    } catch (err) {
      addMessage("❌ Yhteysvirhe: " + err.message, "ai");
      status.innerText = "Virhe backendissa";
    }
  }

  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
  });
</script>

</body>
</html>
