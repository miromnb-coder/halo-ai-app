<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo AI Builder 🔥</title>

<style>
body{margin:0;font-family:-apple-system;background:#0a0a0a;color:white}
.app{display:flex;flex-direction:column;height:100vh}

/* header */
.header{padding:14px;text-align:center;font-size:20px;font-weight:bold;background:#111}

/* chat */
.chat{flex:1;overflow:auto;padding:10px}
.msg{padding:10px;border-radius:12px;margin-bottom:8px;max-width:80%}
.user{background:#00aaff;margin-left:auto}
.ai{background:#222}

/* preview */
.preview{height:45%;border-top:1px solid #222}
iframe{width:100%;height:100%;border:none;background:white}

/* input */
.inputBar{display:flex;padding:10px;background:#111;gap:6px}
input{flex:1;padding:12px;border-radius:12px;border:none}
button{padding:12px;border-radius:12px;border:none;background:linear-gradient(45deg,#00ffcc,#00aaff)}

/* store cards */
.card{background:#111;padding:10px;border-radius:12px;margin-bottom:10px}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>
<body>

<div class="app">

<div class="header">🚀 Halo AI Builder</div>

<div class="chat" id="chat"></div>

<div class="preview">
<iframe id="view"></iframe>
</div>

<div class="inputBar">
<input id="keyInput" placeholder="API key (optional)">
<input id="input" placeholder="Describe app...">
<button onclick="send()">Send</button>
<button onclick="publish()">🌍</button>
<button onclick="openStore()">🏪</button>
</div>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey:"PASTE",
  authDomain:"PASTE",
  projectId:"halo-ai-store"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// state
let history=[];
let currentCode="";

// refs
const chat=document.getElementById("chat");
const view=document.getElementById("view");

// UI
function msg(t,type){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=t;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

// render
function render(){
view.srcdoc=currentCode;
}

// fallback UI
function fallback(p){
return `
<div style="font-family:sans-serif;padding:20px">
<h2>${p}</h2>
<input placeholder="Type..." style="padding:10px;border-radius:8px;width:100%">
<button style="margin-top:10px;padding:12px;border:none;border-radius:10px;background:#007aff;color:white">
Start
</button>
</div>
`;
}

// 🔥 AI BUILDER
async function send(){

const text=input.value;
if(!text)return;

msg(text,"user");
input.value="";
history.push(text);

msg("Thinking...","ai");

const key = keyInput.value;

let code="";

if(!key){
code=fallback(text);
}else{
try{
const res=await fetch("https://api.openai.com/v1/responses",{
method:"POST",
headers:{
"Authorization":"Bearer "+key,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"gpt-4.1-mini",
input:`
You are an elite mobile app designer.

RULES:
- Return ONLY HTML
- Create a real mobile UI
- Use buttons, inputs, layout
- Use inline CSS
- Make it modern (iOS style)
- NO plain text pages
- NO links as main content

Build this app:
${history.join("\n")}
`
})
});

const data=await res.json();

code =
data?.output?.[0]?.content?.[0]?.text ||
data?.output_text ||
fallback(text);

// fix markdown
code = code.replace(/```html|```/g,"");

}catch{
code=fallback(text);
}
}

currentCode=code;
render();

msg("Updated ✅","ai");
}

// 🌍 publish
async function publish(){

if(!currentCode)return alert("No app");

const id=Date.now().toString();

await db.collection("apps").doc(id).set({
code:currentCode,
created:Date.now()
});

const url=location.origin+location.pathname+"?id="+id;

prompt("Share link:",url);
}

// 🏪 store
async function openStore(){

chat.innerHTML="<h2>🌍 App Store</h2>";

const snap=await db.collection("apps")
.orderBy("created","desc")
.get();

snap.forEach(doc=>{

const c=document.createElement("div");
c.className="card";

c.innerHTML=`
App<br>
<button onclick="openApp('${doc.id}')">Open</button>
`;

chat.appendChild(c);

});
}

// open
function openApp(id){
location.search="?id="+id;
}

// load shared
const params=new URLSearchParams(location.search);
const id=params.get("id");

if(id){
db.collection("apps").doc(id).get().then(doc=>{
if(doc.exists){
currentCode=doc.data().code;
render();
}
});
}

// init
render();

</script>

</body>
</html>
