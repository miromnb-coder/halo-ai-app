<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🚀 Halo AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: radial-gradient(circle at top, #0a0f2c, #000);
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.title {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 20px;
}

.chat {
  margin-top: 20px;
}

.message {
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  max-width: 80%;
}

.user {
  background: #1e90ff;
  margin-left: auto;
}

.ai {
  background: #222;
}

.input-box {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: black;
  padding: 10px;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
}

button {
  background: linear-gradient(45deg, #00d4ff, #00ffa3);
  border: none;
  padding: 12px 16px;
  border-radius: 50%;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">🚀 Halo AI</div>
  <div class="subtitle">AI App Builder (real backend)</div>

  <div id="chat" class="chat"></div>
</div>

<div class="input-box">
  <input id="input" placeholder="Describe your app..." />
  <button onclick="sendMessage()">↑</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  addMessage("Thinking...", "ai");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ message }),
    });

    const data = await res.json();

    document.querySelectorAll(".ai").forEach(e => {
      if (e.innerText === "Thinking...") {
        e.innerText = data.reply;
      }
    });

  } catch (err) {
    addMessage("❌ Error connecting to AI", "ai");
  }
}
</script>

</body>
</html>
