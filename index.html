<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Halo App Builder</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #020617;
  color: white;
}

/* header */
header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
  background: linear-gradient(90deg,#22c55e,#06b6d4);
  -webkit-background-clip: text;
  color: transparent;
}

/* input */
#inputArea {
  display: flex;
  padding: 10px;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 14px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg,#22c55e,#06b6d4);
  color: white;
  font-weight: bold;
}

/* apps grid */
#apps {
  padding: 10px;
  display: grid;
  gap: 15px;
}

/* card */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 10px;
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
}

iframe {
  width: 100%;
  height: 300px;
  border: none;
  border-radius: 12px;
}
</style>
</head>

<body>

<header>🚀 Halo App Builder</header>

<div id="inputArea">
  <input id="input" placeholder="Tee sovellus idea..." />
  <button onclick="createApp()">Luo</button>
</div>

<div id="apps"></div>

<script>
async function createApp() {
  const input = document.getElementById("input");
  const idea = input.value;

  if (!idea) return;

  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: idea })
  });

  const data = await res.json();

  showApp(data.reply);
}

function showApp(code) {
  const card = document.createElement("div");
  card.className = "card";

  const iframe = document.createElement("iframe");
  iframe.srcdoc = code;

  card.appendChild(iframe);
  document.getElementById("apps").prepend(card);
}
</script>

</body>
</html>
